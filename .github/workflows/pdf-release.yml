name: Build and Publish PDF Release
# v2.0 — Uses canonical build_pdf.py pipeline (Python + MathJax + YAML frontmatter + CSS presets)
# Replaces v1.0 which used raw Node.js/Puppeteer with inline CSS

on:
  push:
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      markdown_path:
        description: 'Path to markdown file for PDF generation'
        required: true
        default: 'README.md'
      style:
        description: 'CSS style preset'
        required: false
        default: 'academic'
        type: choice
        options: ['academic', 'modern', 'minimal']
      output_name:
        description: 'Output PDF filename'
        required: false
        default: 'output.pdf'

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install markdown

      - name: Build PDF
        run: |
          python pdf/build_pdf.py \
            --input "${{ inputs.markdown_path || 'README.md' }}" \
            --style "${{ inputs.style || 'academic' }}" \
            --output "${{ inputs.output_name || 'output.pdf' }}"

      - name: Verify PDF
        run: |
          PDF="${{ inputs.output_name || 'output.pdf' }}"
          if [ -f "$PDF" ]; then
            echo "PDF generated: $(du -h "$PDF" | cut -f1)"
          else
            echo "ERROR: PDF not found at $PDF"
            exit 1
          fi

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ inputs.output_name || 'output.pdf' }}
