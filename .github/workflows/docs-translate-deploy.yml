name: Multi-Language Documentation Translation + Deploy
# Replaces gitbook-sync.yml — upgraded from deprecated gitbook-cli to Hugo + Python googletrans
# Automatic translations: English source -> French, Spanish, German, Chinese, Japanese, Arabic
# Deploys multi-language site to GitHub Pages

on:
  push:
    branches: [main, master]
    paths: ['docs/**', '**.md']
  workflow_dispatch:
    inputs:
      source_lang:
        description: 'Source language code'
        required: false
        default: 'en'
      target_langs:
        description: 'Target language codes (space-separated)'
        required: false
        default: 'fr es de zh-cn ja ar'

jobs:
  translate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install translation dependencies
        run: |
          pip install googletrans==4.0.0rc1

      - name: Install Hugo
        run: |
          HUGO_VERSION="0.153.0"
          wget -q "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          hugo version

      - name: Create docs directory if missing
        run: |
          if [ ! -d "docs" ]; then
            mkdir -p docs
            echo "# Documentation" > docs/index.md
            echo "Documentation will appear here after translation." >> docs/index.md
          fi

      - name: Translate documentation
        env:
          SOURCE_LANG: ${{ inputs.source_lang || 'en' }}
          TARGET_LANGS: ${{ inputs.target_langs || 'fr es de zh-cn ja ar' }}
        run: |
          python tools/translate_docs.py \
            --docs-dir docs \
            --content-dir content \
            --source-lang "${SOURCE_LANG}" \
            --langs ${TARGET_LANGS}

      - name: Build Hugo site
        run: |
          hugo --minify --enableGitInfo

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
          commit_message: 'docs: auto-translate multi-language build [skip ci]'
