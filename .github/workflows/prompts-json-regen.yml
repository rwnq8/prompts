name: Rebuild prompts.json
# v2.0 — Uses canonical tools/rebuild_prompts_json.py (F5 fix)
# Replaces v1.0 inline python -c with fragile quoting

on:
  push:
    paths:
      - 'templates/**'
      - 'scholar/**'
      - 'email/EMAIL-*.md'
      - 'agents/*.md'
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rebuild prompts.json
        run: python tools/rebuild_prompts_json.py

      - name: Commit if changed
        run: |
          git config user.name "QNFO Bot"
          git config user.email "bot@qnfo.org"
          git add prompts.json
          if git diff --cached --quiet; then
            echo "No changes to prompts.json"
          else
            git commit -m "auto: Rebuild prompts.json [skip ci]"
            git push
          fi
