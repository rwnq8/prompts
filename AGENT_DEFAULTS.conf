# ═══════════════════════════════════════════════════════════════
# AGENT DEFAULTS — IMMUTABLE DIRECTIVE
# ═══════════════════════════════════════════════════════════════
# Effective:  2026-05-10
# Directive:  System Prompt Generator v4.0
# Scope:      ALL agent prompts generated from this workspace
# Status:     PERMANENT (supersedable only by explicit user directive)
#
# NOTE: DeepChat does not expose a temperature slider for the
# deepseek-v4-pro model in its UI. Therefore, this directive is
# enforced at the prompt generation layer — every system prompt
# produced by the prompt generator must embed the following
# parameters in its configuration block:
#
#   temperature: 0.0
#
# REASON: Deterministic, reproducible output. Zero randomness.
# All agents operate as deterministic compilers with no
# stochastic variance in their generation pipeline.
# ═══════════════════════════════════════════════════════════════

DEFAULT_TEMPERATURE=0.0
DEFAULT_TOP_P=1.0
DEFAULT_FREQUENCY_PENALTY=0.0
DEFAULT_PRESENCE_PENALTY=0.0

# ENFORCEMENT: Every prompt file generated by the prompt generator
# must include the following block (verbatim) unless a
# superseding user directive overrides it:
#
#   CONFIGURATION:
#     temperature: 0.0
#     top_p: 1.0
#     frequency_penalty: 0.0
#     presence_penalty: 0.0

MATH_FORMAT_VERIFICATION=REQUIRED
MATH_UNICODE_SCAN=BEFORE_OUTPUT
# ENFORCEMENT: Every agent prompt must include Rule 6
# (math formatting) in its Core Operating Rules section.
# No output may contain bare Unicode math characters outside
# of $$...$$, $...$, or code blocks.

GIT_BRANCH_DISCIPLINE=REQUIRED
GIT_FEATURE_BRANCH_PREFIX=feature/
GIT_PRE_WORK_AUDIT=REQUIRED
GIT_POST_WORK_AUDIT=REQUIRED
# ENFORCEMENT: Every agent prompt generated from this workspace MUST include:
#
#   1. Phase 0 Git Pre-Flight Check with:
#      - Session identity snapshot (branch + commit recorded at start)
#      - Multi-process interference detection (re-verify branch before every file op)
#      - Standard pre-work checks (feature branch verification, cleanliness)
#
#   2. Phase 5 Git Post-Flight & Self-Audit with:
#      - Branch confirmation
#      - Commit existence verification (git log -1)
#      - Clean working tree check
#
#   3. A dedicated Git Protocol section containing:
#      - The Iron Rule: NEVER commit to main/master. Feature branches ONLY.
#      - Pre-work checklist (6 steps)
#      - Post-work checklist (5 steps)
#      - Git execution audit (3-question self-check)
#      - Branch naming convention (feature/kebab-case)
#      - Commit message format (ACTION:... FILE:... RATIONALE:...)
#      - Failure scenarios & recovery (8 minimum)
#      - The Ultimate Rule: stated commits MUST exist
#
#   4. Git failure scenarios in the Edge Cases section:
#      - GIT BRANCH VIOLATION
#      - GIT COMMIT NOT EXECUTED
#      - GIT DIRTY STATE AT RESPONSE END
#
# REASON: Multiple LLM processes operate on shared repositories.
# Without strict branch discipline, processes overwrite each other's
# work, commits are stated but not executed, and branch state drifts
# between operations. This directive ensures every agent maintains
# traceable, auditable git hygiene regardless of multi-process contention.
